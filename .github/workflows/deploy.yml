name: Deploy to Netlify

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get Netlify Site ID
        id: site
        run: |
          SITES=$(curl -s -H "Authorization: Bearer $NETLIFY_AUTH_TOKEN" https://api.netlify.com/api/v1/sites)
          echo "Sites: $(echo "$SITES" | python3 -c "import sys,json; s=json.load(sys.stdin); print([(x['name'],x['id']) for x in s])")"
          SITE_ID=$(echo "$SITES" | python3 -c "
import sys, json, re
sites = json.load(sys.stdin)
for s in sites:
    if re.search('remgt', s.get('name','') + s.get('ssl_url',''), re.I):
        print(s['id']); break
")
          echo "site_id=$SITE_ID" >> "$GITHUB_OUTPUT"
          echo "Found: $SITE_ID"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}

      - name: Deploy via Netlify API (zip upload)
        run: |
          SITE_ID="${{ steps.site.outputs.site_id }}"
          echo "Deploying to: $SITE_ID"
          
          # Create zip of index.html
          zip deploy.zip index.html
          
          # Upload to Netlify as new production deploy
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $NETLIFY_AUTH_TOKEN" \
            -H "Content-Type: application/zip" \
            --data-binary @deploy.zip \
            "https://api.netlify.com/api/v1/sites/$SITE_ID/deploys")
          
          HTTP_STATUS=$(echo "$RESPONSE" | tail -1 | cut -d: -f2)
          BODY=$(echo "$RESPONSE" | head -n -1)
          
          echo "HTTP Status: $HTTP_STATUS"
          echo "Response: $BODY" | head -c 500
          
          if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ]; then
            echo "Deploy created successfully!"
            DEPLOY_ID=$(echo "$BODY" | python3 -c "import sys,json; print(json.load(sys.stdin).get('id',''))")
            echo "Deploy ID: $DEPLOY_ID"
          else
            echo "Deploy failed with status $HTTP_STATUS"
            exit 1
          fi
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
