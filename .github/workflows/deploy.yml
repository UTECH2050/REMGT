name: Deploy to Netlify

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Netlify CLI
        run: npm install -g netlify-cli

      - name: Find Netlify Site ID and Deploy
        run: |
          echo "=== Fetching site list ==="
          SITES_JSON=$(curl -s -H "Authorization: Bearer $NETLIFY_AUTH_TOKEN" https://api.netlify.com/api/v1/sites)
          echo "Sites found: $(echo $SITES_JSON | python3 -c 'import sys,json; print(len(json.load(sys.stdin)))')"
          
          SITE_ID=$(echo $SITES_JSON | python3 -c "
import sys, json
sites = json.load(sys.stdin)
for s in sites:
    name = s.get('name','')
    url = s.get('ssl_url', s.get('url',''))
    custom = s.get('custom_domain','')
    print(f'  Site: {name} | {url}', file=sys.stderr)
    if 'remgt' in name.lower() or 'remgt' in url.lower():
        print(s['id'])
        sys.exit(0)
print('NOT_FOUND')
")
          
          echo "=== Site ID: $SITE_ID ==="
          if [ "$SITE_ID" = "NOT_FOUND" ] || [ -z "$SITE_ID" ]; then
            echo "ERROR: Could not find remgt-rental site"
            exit 1
          fi
          
          echo "=== Deploying ==="
          netlify deploy --prod --dir=. --site=$SITE_ID --auth=$NETLIFY_AUTH_TOKEN --message="GitHub Actions deploy"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
