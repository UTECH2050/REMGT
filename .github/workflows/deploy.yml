name: Deploy to Netlify

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          npm install -g netlify-cli
          sudo apt-get install -y jq

      - name: Get Netlify Site ID
        id: site
        run: |
          SITES=$(curl -s -H "Authorization: Bearer $NETLIFY_AUTH_TOKEN" https://api.netlify.com/api/v1/sites)
          echo "Total sites: $(echo "$SITES" | jq length)"
          echo "$SITES" | jq -r '.[].name'
          SITE_ID=$(echo "$SITES" | jq -r '.[] | select(.name | test("remgt";"i")) | .id' | head -1)
          if [ -z "$SITE_ID" ]; then
            SITE_ID=$(echo "$SITES" | jq -r '.[] | select(.ssl_url | test("remgt";"i")) | .id' | head -1)
          fi
          echo "Site ID found: $SITE_ID"
          echo "site_id=$SITE_ID" >> "$GITHUB_OUTPUT"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}

      - name: Deploy to Netlify
        run: |
          SITE_ID="${{ steps.site.outputs.site_id }}"
          echo "Deploying to site: $SITE_ID"
          netlify deploy --prod --dir=. --site="$SITE_ID" --auth="$NETLIFY_AUTH_TOKEN"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
